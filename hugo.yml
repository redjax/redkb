---
baseURL: https://example.com
title: redkb

## Parse git commit
enableGitInfo: true

module:
  imports:
    - path: github.com/imfing/hextra

markup:
  ## Allow raw HTML
  goldmark:
    renderer:
      unsafe: true

  ## Enable hextra syntax highlighting
  highlight:
    noClasses: false

menu:
  main:
    - name: Docs
      pageRef: /docs
      weight: 10
    - name: Snippets
      pageRef: /snippets
      weight: 20
    - name: Tags
      pageRef: /tags
      weight: 30
    - name: Search
      weight: 40
      params:
        type: search
    - name: GitHub
      weight: 50
      url: "https://github.com/redjax/redkb"
      params:
        icon: github
    - name: Theme Toggle
      weight: 60
      params:
        type: theme-toggle
        label: false

params:
  navbar:
    displayTitle: true
    displayLogo: false
    # logo:
    #   path: images/logo.svg
    #   dark: images/logo-dark.svg
    #   link: /
    #   width: 40
    #   height: 20

  footer:
    enable: false
    displayCopyright: true
    displayPoweredBy: false

  displayUpdatedDate: true
  dateFormat: "January 2, 2006"

  editURL:
    enable: true
    base: "https://github.com/redjax/redkb/edit/main/content"

  imageZoom:
    enable: true
