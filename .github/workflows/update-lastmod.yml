---
########################################################
# Update Last Modified                                 #
#                                                      #
# Scans each content file and, if that file changed in #
# the Git history, updates that "last modified" tag.   #
########################################################

name: Update lastmod

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write

jobs:
  update-lastmod:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Update lastmod fields
        run: python scripts/hugo/update_lastmod_time.py

      - name: Commit and push changes
        run: |
          if git diff --quiet; then
            echo "No changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add content/

          git commit -m "chore: update Hugo lastmod timestamps"
          git push
