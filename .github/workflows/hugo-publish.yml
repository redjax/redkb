---
#############################################
# Reusable workflow to publish a Hugo site. #
#############################################

name: Hugo Publish Site

on:
  workflow_call:
    inputs:
      target:
        description: "Publish target: github-pages or github-release."
        required: true
        type: string

      artifact-name:
        description: "Name of the build artifact to download."
        required: false
        type: string
        default: "hugo-site"

      release-name:
        description: "GitHub release name."
        required: false
        type: string
        default: ""

      release-version:
        description: "Optional version string used to build a tag and archive names."
        required: false
        type: string
        default: ""

      release-tag:
        description: "Optional explicit Git tag to use for the GitHub release."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  build:
    if: ${{ inputs.target == 'github-release' || inputs.target == 'github-pages' }}
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      name: ${{ steps.meta.outputs.name }}
    steps:
      - uses: actions/checkout@v7

      - name: Build Hugo site
        uses: redjax/pipelinetemplates/.github/actions/hugo-build@gh/hugo-build/v0.0.3
        with:
          source-dir: "."
          public-dir: "public"
          check-changed: "false"
          use-cache: "true"
          environment: "production"
          build-flags: "--gc --minify --enableGitInfo"
          publish-artifact: "true"
          artifact-name: ${{ inputs.artifact-name }}
          artifact-if-no-files-found: "error"
          artifact-retention-days: "7"

      - name: Resolve metadata
        id: meta
        shell: bash
        env:
          RELEASE_VERSION: ${{ inputs.release-version }}
          RELEASE_NAME: ${{ inputs.release-name }}
          RELEASE_TAG: ${{ inputs.release-tag }}
        run: |
          set -Eeuo pipefail
          if [[ -n "${RELEASE_TAG}" ]]; then
            tag="${RELEASE_TAG}"
          elif [[ -n "${RELEASE_VERSION}" ]]; then
            tag="site-v${RELEASE_VERSION}"
          else
            tag="site"
          fi

          if [[ -n "${RELEASE_NAME}" ]]; then
            name="${RELEASE_NAME}"
          elif [[ -n "${RELEASE_VERSION}" ]]; then
            name="site-v${RELEASE_VERSION}"
          else
            name="site"
          fi

          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"

  github-release:
    needs: build
    if: ${{ inputs.target == 'github-release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: ./_published

      - name: Check release exists
        id: relcheck
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.build.outputs.tag }}
        shell: bash
        run: |
          set -Eeuo pipefail
          if gh release view "${TAG}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag
        if: ${{ steps.relcheck.outputs.exists != 'true' }}
        shell: bash
        env:
          TAG: ${{ needs.build.outputs.tag }}
        run: |
          set -Eeuo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${TAG}" -m "${TAG}"
          git push origin "${TAG}"

      - name: Package site
        shell: bash
        env:
          NAME: ${{ needs.build.outputs.name }}
        run: |
          set -Eeuo pipefail
          mkdir -p ./_release
          tar -C ./_published -czf "./_release/${NAME}.tar.gz" .
          (cd ./_published && zip -r "../_release/${NAME}.zip" .)

      - name: Create GitHub Release
        if: ${{ steps.relcheck.outputs.exists != 'true' }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.build.outputs.tag }}
          name: ${{ needs.build.outputs.name }}
          files: |
            ./_release/${{ needs.build.outputs.name }}.tar.gz
            ./_release/${{ needs.build.outputs.name }}.zip
        env:
          GITHUB_TOKEN: ${{ github.token }}

  github-pages:
    needs: build
    if: ${{ inputs.target == 'github-pages' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ inputs.artifact-name }}
          path: ./_published

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./_published

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
