---
name: Hugo version bump

on:
  push:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "static/**"
      - "hugo.yml"
      - "go.mod"
      - "go.sum"

  workflow_dispatch:
    inputs:
      dry-run:
        description: Dry run
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: hugo-version-bump
  cancel-in-progress: false

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install bump-my-version
        run: python -m pip install --upgrade bump-my-version

      - name: Bump version files
        shell: bash
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -Eeuo pipefail
          if [[ "${DRY_RUN:-false}" == "true" ]]; then
            echo "[DRY RUN] Would bump version files."
            exit 0
          fi

          ./scripts/versioning/bump-site-version.sh

      - name: Create or update bump PR
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_BOT_PAT }}
          branch: bump/site-version
          base: main
          delete-branch: true
          title: "chore(release): bump site version"
          commit-message: "chore(release): bump site version"
          body: |
            Automated version bump for Hugo site changes.
          add-paths: |
            .version
            .bumpversion.toml
          labels: |
            automated
            release

      - name: Merge bump PR
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_BOT_PAT }}
          PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
        shell: bash
        run: |
          set -Eeuo pipefail
          gh pr merge "${PR_NUMBER}" --merge --delete-branch
