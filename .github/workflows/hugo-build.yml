---
name: Hugo build

on:
  workflow_dispatch:
    inputs:
      create-release:
        description: "Create a GitHub release after build."
        required: false
        type: boolean
        default: true

      deploy-pages:
        description: "Deploy GitHub Pages after release."
        required: false
        type: boolean
        default: false

      release-source:
        description: "manual or tag"
        required: false
        type: choice
        default: manual
        options:
          - manual
          - tag

      release-version:
        description: "Release version or short SHA."
        required: false
        type: string
        default: ""

      release-name:
        description: "Release name."
        required: false
        type: string
        default: ""

      release-tag:
        description: "Release tag."
        required: false
        type: string
        default: ""

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build Hugo site
        uses: redjax/pipelinetemplates/.github/actions/hugo-build@gh/hugo-build/v0.0.3
        with:
          source-dir: "."
          public-dir: "public"
          check-changed: "false"
          use-cache: "true"
          environment: "production"
          build-flags: "--gc --minify --enableGitInfo"
          publish-artifact: "true"
          artifact-name: "hugo-site"
          artifact-if-no-files-found: "error"
          artifact-retention-days: "7"
