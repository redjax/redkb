---
name: Hugo build

on:
  workflow_dispatch:
    inputs:
      create-release:
        description: "Create a GitHub release after build."
        required: false
        type: boolean
        default: true

      deploy-pages:
        description: "Deploy GitHub Pages after release."
        required: false
        type: boolean
        default: false

      release-source:
        description: "manual or tag"
        required: false
        type: choice
        default: manual
        options:
          - manual
          - tag

  push:
    tags:
      - "site-v*"

permissions:
  contents: read
  actions: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      release-name: ${{ steps.meta.outputs.release-name }}
      release-tag: ${{ steps.meta.outputs.release-tag }}
      release-version: ${{ steps.meta.outputs.release-version }}
      should-release: ${{ steps.meta.outputs.should-release }}
      should-deploy-pages: ${{ steps.meta.outputs.should-deploy-pages }}
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
      run-id: ${{ github.run_id }}
    steps:
      - uses: actions/checkout@v7

      - name: Build Hugo site
        uses: redjax/pipelinetemplates/.github/actions/hugo-build@gh/hugo-build/v0.0.3
        with:
          source-dir: "."
          public-dir: "public"
          check-changed: "false"
          use-cache: "true"
          environment: "production"
          build-flags: "--gc --minify --enableGitInfo"
          publish-artifact: "true"
          artifact-name: "hugo-site"
          artifact-if-no-files-found: "error"
          artifact-retention-days: "7"

      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "artifact-name=hugo-site" >> "$GITHUB_OUTPUT"

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ "${{ inputs.release-source }}" == "manual" ]]; then
              short_sha="${GITHUB_SHA::7}"

              echo "release-version=${short_sha}" >> "$GITHUB_OUTPUT"
              echo "release-tag=site-${short_sha}" >> "$GITHUB_OUTPUT"
              echo "release-name=site-${short_sha}" >> "$GITHUB_OUTPUT"
            else
              version="$(tr -d '[:space:]' < .version)"

              echo "release-version=${version}" >> "$GITHUB_OUTPUT"
              echo "release-tag=site-v${version}" >> "$GITHUB_OUTPUT"
              echo "release-name=site-v${version}" >> "$GITHUB_OUTPUT"
            fi

            echo "should-release=${{ inputs.create-release }}" >> "$GITHUB_OUTPUT"
            echo "should-deploy-pages=${{ inputs.deploy-pages }}" >> "$GITHUB_OUTPUT"
          else
            version="$(tr -d '[:space:]' < .version)"

            echo "release-version=${version}" >> "$GITHUB_OUTPUT"
            echo "release-tag=site-v${version}" >> "$GITHUB_OUTPUT"
            echo "release-name=site-v${version}" >> "$GITHUB_OUTPUT"
            echo "should-release=true" >> "$GITHUB_OUTPUT"
            echo "should-deploy-pages=true" >> "$GITHUB_OUTPUT"
          fi

  release:
    needs: build
    if: ${{ needs.build.outputs.should-release == 'true' }}
    permissions:
      contents: write
      pages: write
      id-token: write
      actions: read
    uses: ./.github/workflows/hugo-release.yml
    with:
      run-id: ${{ needs.build.outputs.run-id }}
      release-name: ${{ needs.build.outputs.release-name }}
      release-tag: ${{ needs.build.outputs.release-tag }}
      release-version: ${{ needs.build.outputs.release-version }}
      artifact-name: ${{ needs.build.outputs.artifact-name }}
      should-release: ${{ needs.build.outputs.should-release == 'true' }}
      should-deploy-pages: ${{ needs.build.outputs.should-deploy-pages == 'true' }}
    secrets: inherit
