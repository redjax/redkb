---
#################################################################
# Build the Hugo site in a pipeline.                            #
#                                                               #
# Uploads the static files as an artifact to the pipeline.      #
# Runs automatically on PR open to ensure site builds properly. #
#################################################################

name: Build Hugo site

on:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - "archetypes/**"
  #     - "content/**"
  #     - "data/**"
  #     - "i18n/**"
  #     - "static/**"
  #     - "hugo.yml"
  #     - "go.mod"
  #     - "go.sum"

  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
    paths:
      - "archetypes/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "static/**"
      - "hugo.yml"
      - "go.mod"
      - "go.sum"

  workflow_dispatch:
    inputs:
      runner-image:
        type: string
        default: "ubuntu-latest"
      use-cache:
        description: "Enable Hugo build cache"
        type: boolean
        default: true
      clean-cache:
        description: "Clean Hugo generated cache before build"
        type: boolean
        default: false

permissions:
  actions: write
  contents: write

jobs:
  build:
    uses: redjax/pipelinetemplates/.github/workflows/hugo-build.yml@main
    with:
      hugo-version: "0.164.0"
      site-root: "."
      artifact-name: "hugo-site"
      public-dir: "public"
      check-changed: "false"
      use-cache: ${{ inputs.use-cache == true && 'true' || 'false' }}
      clean-cache: ${{ inputs.clean-cache == true && 'true' || 'false' }}
      environment: "production"
      build-flags: "--gc --minify --enableGitInfo"
      artifact-retention-days: 7
      artifact-if-no-files-found: "error"
      runner-image: ${{ inputs.runner-image || 'ubuntu-latest' }}
      checkout-ref: ${{ github.sha }}
      debug-build-state: false
    secrets: inherit
