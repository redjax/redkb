---
name: Hugo version bump

on:
  push:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "static/**"
      - "hugo.yml"
      - "go.mod"
      - "go.sum"

  workflow_dispatch:
    inputs:
      dry-run:
        description: Dry run
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v8
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Install bump-my-version
        run: python -m pip install --upgrade bump-my-version

      - name: Bump version
        env:
          DRY_RUN: ${{ inputs.dry-run }}
        run: |
          set -Eeuo pipefail
          if [[ "${DRY_RUN:-false}" == "true" ]]; then
            echo "[DRY RUN] Would bump site version."
            exit 0
          fi
          ./scripts/versioning/bump-site-version.sh

      - name: Create or update bump PR
        if: github.event_name != 'workflow_dispatch' || inputs.dry-run == false
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: bump/site-version
          base: main
          delete-branch: true
          title: "chore(release): bump site version"
          commit-message: "chore(release): bump site version"
          body: |
            Automated version bump for Hugo site changes.
          add-paths: |
            .version
            .bumpversion.toml

      - name: Enable auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr merge "${{ steps.cpr.outputs.pull-request-number }}" --merge --auto
