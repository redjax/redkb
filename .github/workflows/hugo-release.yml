---
name: Hugo release

on:
  workflow_call:
    inputs:
      release-source:
        required: false
        type: string
        default: "tag"

      release-version:
        required: true
        type: string

      release-name:
        required: true
        type: string

      release-tag:
        required: true
        type: string

      should-release:
        required: false
        type: boolean
        default: true

      should-deploy-pages:
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact-name }}
    steps:
      - uses: actions/checkout@v7

      - name: Build Hugo site
        uses: redjax/pipelinetemplates/.github/actions/hugo-build@gh/hugo-build/v0.0.3
        with:
          source-dir: "."
          public-dir: "public"
          check-changed: "false"
          use-cache: "true"
          environment: "production"
          build-flags: "--gc --minify --enableGitInfo"
          publish-artifact: "true"
          artifact-name: "hugo-site"
          artifact-if-no-files-found: "error"
          artifact-retention-days: "7"

      - name: Resolve artifact metadata
        id: meta
        shell: bash
        run: |
          set -Eeuo pipefail
          echo "artifact-name=hugo-site" >> "$GITHUB_OUTPUT"

  release:
    needs: build
    if: ${{ inputs.should-release }}
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: public

      - name: Package site
        shell: bash
        run: |
          set -Eeuo pipefail
          mkdir -p ./_release
          tar -C public -czf ./_release/${{ inputs.release-name }}.tar.gz .
          (cd public && zip -r ../_release/${{ inputs.release-name }}.zip .)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release-tag }}
          name: ${{ inputs.release-name }}
          files: |
            ./_release/${{ inputs.release-name }}.tar.gz
            ./_release/${{ inputs.release-name }}.zip
        env:
          GITHUB_TOKEN: ${{ github.token }}

  deploy-pages:
    needs: build
    if: ${{ inputs.should-deploy-pages }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: public

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
