---
name: Hugo release

on:
  push:
    branches:
      - main
    paths:
      - ".version"
      - ".bumpversion.toml"

  workflow_dispatch:
    inputs:
      release-source:
        description: "manual or tag"
        required: false
        type: choice
        default: manual
        options:
          - manual
          - tag

      deploy-pages:
        description: "Deploy GitHub Pages after release."
        required: false
        type: boolean
        default: false

      release-version:
        description: "Release version or short SHA."
        required: false
        type: string
        default: ""

      release-name:
        description: "Release name."
        required: false
        type: string
        default: ""

      release-tag:
        description: "Release tag."
        required: false
        type: string
        default: ""

permissions:
  contents: write
  pages: write
  id-token: write
  actions: read

concurrency:
  group: hugo-release
  cancel-in-progress: false

jobs:
  meta:
    runs-on: ubuntu-latest
    outputs:
      release-version: ${{ steps.out.outputs.release-version }}
      release-name: ${{ steps.out.outputs.release-name }}
      release-tag: ${{ steps.out.outputs.release-tag }}
      deploy-pages: ${{ steps.out.outputs.deploy-pages }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: out
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_VERSION: ${{ inputs.release-version }}
          INPUT_NAME: ${{ inputs.release-name }}
          INPUT_TAG: ${{ inputs.release-tag }}
          INPUT_DEPLOY: ${{ inputs.deploy-pages }}
        run: |
          set -Eeuo pipefail

          if [[ "${EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${INPUT_VERSION}" ]]; then
              version="${INPUT_VERSION#v}"
            else
              version="${GITHUB_SHA::7}"
            fi

            tag="${INPUT_TAG:-site-${version}}"
            name="${INPUT_NAME:-site-${version}}"
            deploy="${INPUT_DEPLOY:-false}"
          else
            version="$(tr -d '[:space:]' < .version)"
            version="${version#v}"
            tag="site-v${version}"
            name="site-v${version}"
            deploy="true"
          fi

          echo "release-version=${version}" >> "$GITHUB_OUTPUT"
          echo "release-tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release-name=${name}" >> "$GITHUB_OUTPUT"
          echo "deploy-pages=${deploy}" >> "$GITHUB_OUTPUT"

  release:
    needs: meta
    uses: ./.github/workflows/hugo-publish.yml
    with:
      target: github-release
      artifact-name: hugo-site
      release-version: ${{ needs.meta.outputs.release-version }}
      release-name: ${{ needs.meta.outputs.release-name }}
      release-tag: ${{ needs.meta.outputs.release-tag }}
    secrets: inherit

  deploy-pages:
    needs: [meta, release]
    if: ${{ needs.meta.outputs.deploy-pages == 'true' }}
    uses: ./.github/workflows/hugo-publish.yml
    with:
      target: github-pages
      artifact-name: hugo-site
    secrets: inherit
