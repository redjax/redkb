---
name: Hugo release and distribute

on:
  push:
    tags:
      - "hugo/v*"
  workflow_dispatch:
    inputs:
      publish-branch:
        description: "Publish to branch."
        required: false
        type: boolean
        default: false

      publish-github-pages:
        description: "Publish to GitHub Pages."
        required: false
        type: boolean
        default: false

      publish-cloudflare-pages:
        description: "Publish to Cloudflare Pages."
        required: false
        type: boolean
        default: false

      publish-github-release:
        description: "Create GitHub release."
        required: false
        type: boolean
        default: true

      tag:
        description: "Tag to release (e.g. hugo/v1.2.3)"
        required: false
        type: string
        default: ""

      cloudflare-pages-project:
        description: "Cloudflare Pages project name."
        required: false
        type: string
        default: ""

      cloudflare-pages-branch:
        description: "Cloudflare branch name."
        required: false
        type: string
        default: "main"

      cloudflare-pages-directory:
        description: "Directory to deploy to Cloudflare Pages."
        required: false
        type: string
        default: "public"

permissions:
  contents: write
  actions: read

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.pick.outputs.tag }}
      run-id: ${{ steps.run.outputs.run-id }}
      targets: ${{ steps.targets.outputs.targets }}
    steps:
      - name: Decide tag
        id: pick
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.tag }}" ]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi

          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Find latest build artifact
        id: run
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          set -Eeuo pipefail

          run_id="$(gh api "repos/${REPO}/actions/workflows/hugo-build.yml/runs?status=success&per_page=20" --jq '.workflow_runs[0].id')"

          if [ -z "$run_id" ]; then
            echo "No successful build run found."
            exit 1
          fi

          echo "run-id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Compute selected release targets
        id: targets
        shell: bash
        env:
          DO_BRANCH: ${{ inputs.publish-branch }}
          DO_GH_PAGES: ${{ inputs.publish-github-pages }}
          DO_CF_PAGES: ${{ inputs.publish-cloudflare-pages }}
          DO_GH_RELEASE: ${{ inputs.publish-github-release }}
        run: |
          set -Eeuo pipefail

          targets=()

          if [[ "${DO_BRANCH}" == "true" ]]; then
            targets+=("branch")
          fi

          if [[ "${DO_GH_PAGES}" == "true" ]]; then
            targets+=("github-pages")
          fi

          if [[ "${DO_CF_PAGES}" == "true" ]]; then
            targets+=("cloudflare-pages")
          fi

          if [[ "${DO_GH_RELEASE}" == "true" ]]; then
            targets+=("github-release")
          fi

          if (( ${#targets[@]} == 0 )); then
            targets+=("github-release")
          fi

          targets_json="$(printf '%s\n' "${targets[@]}" | jq -R . | jq -s -c .)"
          echo "targets=${targets_json}" >> "$GITHUB_OUTPUT"

  publish:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        target: ${{ fromJSON(needs.resolve.outputs.targets) }}
    uses: redjax/pipelinetemplates/.github/workflows/hugo-publish.yml@gh/hugo-build/v0.0.3
    with:
      target: ${{ matrix.target }}
      run-id: ${{ needs.resolve.outputs.run-id }}
      artifact-name: hugo-site
      branch-name: gh-pages
      commit-message: "Deploy Hugo site"
      cloudflare-pages-project: ${{ inputs.cloudflare-pages-project }}
      cloudflare-pages-branch: ${{ inputs.cloudflare-pages-branch }}
      cloudflare-pages-directory: ${{ inputs.cloudflare-pages-directory }}
      release-name: ${{ needs.resolve.outputs.tag }}
      release-version: ""
      release-tag: ${{ needs.resolve.outputs.tag }}
      dry-run: false
    secrets:
      cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
