---
name: Hugo tag release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - ".version"
      - ".bumpversion.toml"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (example: 1.2.3)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  actions: write

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.v.outputs.tag }}
      release-name: ${{ steps.v.outputs.name }}
      release-version: ${{ steps.v.outputs.version }}
      release-source: ${{ steps.v.outputs.release-source }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: v
        shell: bash
        run: |
          set -Eeuo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.version }}" ]; then
            version="${{ inputs.version }}"
            release_source="manual"
          else
            version="$(tr -d '[:space:]' < .version)"
            release_source="tag"
          fi

          version="${version#v}"
          version="${version#hugo/}"

          if [ "${release_source}" = "manual" ]; then
            if [ -n "${{ inputs.version }}" ]; then
              tag="site-v${version}"
              name="site-v${version}"
            else
              short_sha="${GITHUB_SHA::7}"
              tag="site-${short_sha}"
              name="site-${short_sha}"
              version="${short_sha}"
            fi
          else
            tag="site-v${version}"
            name="site-v${version}"
          fi

          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "name=${name}" >> "$GITHUB_OUTPUT"
          echo "release-source=${release_source}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        id: createtag
        shell: bash
        run: |
          set -Eeuo pipefail
          tag="${{ steps.v.outputs.tag }}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "[INFO] Tag exists: $tag"
            exit 0
          fi

          git tag -a "$tag" -m "$tag"
          git push origin "$tag"
          echo "created=true" >> "$GITHUB_OUTPUT"

      - name: Trigger build workflow
        if: steps.createtag.outputs.created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Hugo build" --ref main \
            -f release-source=${{ steps.v.outputs.release-source }} \
            -f release-version=${{ steps.v.outputs.version }} \
            -f release-name=${{ steps.v.outputs.name }} \
            -f release-tag=${{ steps.v.outputs.tag }}
