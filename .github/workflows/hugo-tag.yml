---
name: Hugo tag release

on:
  pull_request:
    branches:
      - main
    types:
      - closed
    paths:
      - ".version"
      - ".bumpversion.toml"

  workflow_dispatch:
    inputs:
      version:
        description: "Version to tag (example: 1.2.3)"
        required: false
        type: string
        default: ""

permissions:
  contents: write
  actions: write
  pages: write
  id-token: write

jobs:
  tag:
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    outputs:
      release-tag: ${{ steps.meta.outputs.release-tag }}
      release-name: ${{ steps.meta.outputs.release-name }}
      release-version: ${{ steps.meta.outputs.release-version }}
      release-source: ${{ steps.meta.outputs.release-source }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Determine version
        id: meta
        shell: bash
        run: |
          set -Eeuo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.version }}" ]]; then
              version="${{ inputs.version }}"
              version="${version#v}"
              version="${version#hugo/}"
              tag="site-v${version}"
              name="site-v${version}"
            else
              version="${GITHUB_SHA::7}"
              tag="site-${version}"
              name="site-${version}"
            fi
            source="manual"
          else
            version="$(tr -d '[:space:]' < .version)"
            version="${version#v}"
            version="${version#hugo/}"
            tag="site-v${version}"
            name="site-v${version}"
            source="tag"
          fi

          echo "release-version=${version}" >> "$GITHUB_OUTPUT"
          echo "release-tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "release-name=${name}" >> "$GITHUB_OUTPUT"
          echo "release-source=${source}" >> "$GITHUB_OUTPUT"

      - name: Create tag
        id: createtag
        shell: bash
        run: |
          set -Eeuo pipefail
          tag="${{ steps.meta.outputs.release-tag }}"

          if git rev-parse "$tag" >/dev/null 2>&1; then
            echo "created=false" >> "$GITHUB_OUTPUT"
            echo "[INFO] Tag exists: $tag"
            exit 0
          fi

          git tag -a "$tag" -m "$tag"
          git push origin "$tag"
          echo "created=true" >> "$GITHUB_OUTPUT"

  publish:
    needs: tag
    if: needs.tag.outputs.release-tag != ''
    uses: ./.github/workflows/hugo-release.yml
    with:
      release-source: ${{ needs.tag.outputs.release-source }}
      release-version: ${{ needs.tag.outputs.release-version }}
      release-name: ${{ needs.tag.outputs.release-name }}
      release-tag: ${{ needs.tag.outputs.release-tag }}
      should-release: true
      should-deploy-pages: true
    secrets: inherit
