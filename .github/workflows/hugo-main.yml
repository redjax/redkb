---
######################################################################################
# Main Hugo site build/release pipeline.                                             #
#                                                                                    #
# This is a stub of the hugo-site-main.yml orchestrator pipeline in the              #
# PipelineTemplates repository:                                                      #
#   https://github.com/redjax/pipelinetemplates/.github/workflows/hugo-site-main.yml #
#                                                                                    #
# When any Hugo file has changed when a PR is merged into main, the pipeline will    #
# initiate a version bump (i.e. v0.1.0 -> v0.1.1), rebuild the site, create a tagged #
# release in Github, and publish the site to Github Pages.                           #
#                                                                                    #
# On manual runs, the pipeline will skip bumping version and will instead use the    #
# current commit's shorthash, i.e. 466ce77d. The tag/release will be site-466ce77d,  #
# and the pipeline will skip publishing to Github Pages.                             #
######################################################################################

name: Hugo Site Main

on:
  push:
    branches:
      - main
    paths:
      - "archetypes/**"
      - "content/**"
      - "data/**"
      - "i18n/**"
      - "static/**"
      - "hugo.yml"
      - "go.mod"
      - "go.sum"

  workflow_dispatch:
    inputs:
      publish-targets:
        description: 'JSON array of publish targets, e.g. ["github-pages","branch"]'
        type: string
        required: false
        default: '["github-pages","branch"]'
      branch-name:
        type: string
        required: false
        default: "gh-pages"
      runner-img-or-label:
        type: string
        default: ubuntu-latest
      pipelinetemplates-ref:
        description: "Branch, tag, or commit SHA to use when checking out PipelineTemplates repository."
        type: string
        default: main
      use-hugo-cache:
        type: boolean
        required: false
        default: true
      clean-hugo-cache:
        type: boolean
        required: false
        default: false
      hugo-version:
        type: string
        required: false
        default: "0.161.1"
      hugo-build-flags:
        type: string
        required: false
        default: "--gc --minify --enableGitInfo"
      debug-hugo-build-state:
        type: boolean
        required: false
        default: false

jobs:
  pipeline:
    permissions:
      contents: write
      actions: write
      pull-requests: write
      pages: write
      id-token: write
    uses: redjax/pipelinetemplates/.github/workflows/hugo-site-main.yml@feat/separate-hugo-publish-workflows
    with:
      site-root: "."
      versioned: true
      version-file: ".version"
      artifact-name: "hugo-site"
      release-prefix: "site"
      publish-targets: ${{ inputs.publish-targets || '["github-pages","branch"]' }}
      branch-name: ${{ inputs.branch-name || 'gh-pages' }}
      runner-image: ${{ inputs.runner-img-or-label || 'ubuntu-latest' }}
      templates-ref: ${{ inputs.pipelinetemplates-ref || 'main' }}
      hugo-version: ${{ inputs.hugo-version || '0.161.1' }}
      hugo-build-flags: ${{ inputs.hugo-build-flags || '--gc --minify --enableGitInfo' }}
      use-hugo-cache: ${{ inputs.use-hugo-cache || true }}
      clean-hugo-cache: ${{ inputs.clean-hugo-cache || false }}
      debug-hugo-build-state: ${{ inputs.debug-hugo-build-state || false }}
    secrets:
      release-bot-pat: ${{ secrets.RELEASE_BOT_PAT }}
